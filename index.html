<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>MLB PROFESSIONAL DASHBOARD v2.0</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet"/>
  
  <style>
    /* 1. 전역 스타일링 (기본 설정) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: #F0F2F5;
      color: #1A1A1A;
      font-family: "Inter", "Noto Sans KR", sans-serif;
      line-height: 1.6;
      overflow: hidden; /* 전체 페이지 스크롤 방지, 내부 스크롤 사용 */
      touch-action: pan-y;
    }

    /* 2. 레이아웃 구조 정의 */
    #root {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      max-width: 600px; /* 모바일 뷰 최적화 */
      margin: 0 auto;
      position: relative;
      background: #F0F2F5;
    }

    /* 3. 헤더 섹션 (고정 영역) */
    .dashboard-header {
      padding: 30px 20px 10px;
      background: #F0F2F5;
      flex-shrink: 0;
      z-index: 100;
    }

    .header-main-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 25px;
    }

    .title-group h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #1A1A1A;
      margin-bottom: 4px;
    }

    .title-group p {
      font-size: 13px;
      color: rgba(0,0,0,0.45);
      font-weight: 600;
    }

    .info-group {
      text-align: right;
    }

    .clock-display {
      font-size: 17px;
      font-weight: 800;
      color: #1A1A1A;
    }

    .date-display {
      font-size: 12px;
      color: rgba(0,0,0,0.45);
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
    }

    .update-timestamp {
      font-size: 12px;
      color: rgba(0,0,0,0.4);
      font-weight: 500;
    }

    .refresh-action-btn {
      background: #E31837;
      color: #FFFFFF;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 12px;
      border: none;
      box-shadow: 0 4px 12px rgba(227, 24, 55, 0.25);
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-action-btn:active {
      transform: scale(0.95);
      opacity: 0.9;
    }

    /* 4. 리그 필터링 버튼 (AL / NL) */
    .league-filter-box {
      display: flex;
      gap: 12px;
      margin: 20px 0;
    }

    .filter-tab {
      flex: 1;
      padding: 16px;
      border-radius: 16px;
      font-weight: 900;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .filter-tab.active {
      background: #E31837;
      color: #FFFFFF;
      box-shadow: 0 8px 16px rgba(227, 24, 55, 0.2);
    }

    .filter-tab.inactive {
      background: #FFFFFF;
      color: #1A1A1A;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    /* 5. 검색창 스타일 (추가 기능) */
    .search-input-wrapper {
      margin-bottom: 15px;
    }

    .main-search-bar {
      width: 100%;
      padding: 16px 20px;
      border-radius: 18px;
      border: 2px solid transparent;
      background: #E2E6EF;
      color: #1A1A1A;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      transition: all 0.2s;
    }

    .main-search-bar:focus {
      background: #FFFFFF;
      border-color: #E31837;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    /* 6. 메인 뷰 슬라이더 (페이지 전환) */
    .view-slider {
      flex: 1;
      display: flex;
      width: 200%;
      transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .view-container {
      width: 50%;
      height: 100%;
      overflow-y: auto;
      padding: 0 20px 160px;
      scrollbar-width: none;
    }

    .view-container::-webkit-scrollbar {
      display: none;
    }

    .page-indicator {
      padding: 15px 0;
      font-weight: 800;
      color: rgba(0,0,0,0.5);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* 7. 경기 카드 디자인 (AL/NL 공통) */
    .match-item-card {
      background: #FFFFFF;
      border-radius: 28px;
      padding: 26px;
      margin-bottom: 16px;
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 10px 25px rgba(0,0,0,0.02);
      animation: cardAppear 0.5s ease-out;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .time-label {
      color: #FFB300;
      font-size: 14px;
      font-weight: 900;
    }

    .venue-label {
      color: rgba(0,0,0,0.4);
      font-size: 12px;
      font-weight: 600;
    }

    .match-teams-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team-display-unit {
      flex: 1;
      text-align: center;
    }

    .team-icon-big {
      font-size: 52px;
      margin-bottom: 10px;
      display: block;
    }

    .team-id-bold {
      font-weight: 900;
      font-size: 22px;
      color: #1A1A1A;
    }

    .team-stat-small {
      font-size: 13px;
      color: rgba(0,0,0,0.35);
      margin-top: 4px;
      font-weight: 600;
    }

    .vs-separator {
      font-size: 30px;
      font-weight: 900;
      color: rgba(0,0,0,0.1);
      padding: 0 15px;
    }

    /* 8. 순위 테이블 디자인 */
    .standing-list-wrapper {
      background: #FFFFFF;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .st-header {
      display: grid;
      grid-template-columns: 55px 1fr 50px 50px 80px;
      padding: 20px;
      background: #F9FAFC;
      font-size: 11px;
      font-weight: 900;
      color: rgba(0,0,0,0.4);
      border-bottom: 1px solid #F1F3F7;
    }

    .st-row {
      display: grid;
      grid-template-columns: 55px 1fr 50px 50px 80px;
      padding: 22px 20px;
      border-bottom: 1px solid #F3F5F9;
      align-items: center;
      transition: background 0.2s;
    }

    .st-row:active {
      background: #F9FAFC;
    }

    .st-rank {
      font-weight: 900;
      font-size: 16px;
    }

    .st-team-box {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .st-team-icon {
      font-size: 24px;
    }

    .st-team-id {
      font-weight: 800;
      font-size: 16px;
    }

    .st-val-bold {
      font-size: 15px;
      font-weight: 700;
    }

    .st-val-light {
      font-size: 15px;
      color: rgba(0,0,0,0.3);
      font-weight: 500;
    }

    .st-pct {
      font-weight: 900;
      color: #E31837;
      font-size: 15px;
      text-align: right;
    }

    /* 9. 하단 내비게이션 바 */
    .bottom-navigation {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #FFFFFF;
      display: flex;
      padding: 16px 0 45px;
      border-top: 1px solid rgba(0,0,0,0.05);
      z-index: 200;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.02);
    }

    .nav-button {
      flex: 1;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .nav-icon-box {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .nav-text-box {
      font-size: 13px;
      font-weight: 900;
    }

    .nav-active-color {
      color: #E31837;
    }

    .nav-default-color {
      color: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/**

const MLB_TEAM_DATABASE = {

  "OAK": { id: "OAK", name: "Oakland", emoji: "🐘", league: "AL", div: "West", w: 10, l: 16 },
  "LAA": { id: "LAA", name: "Angels", emoji: "👼", league: "AL", div: "West", w: 10, l: 15 },

  // NATIONAL LEAGUE (NL) - WEST
  "LAD": { id: "LAD", name: "LA Dodgers", emoji: "💙", league: "NL", div: "West", w: 18, l: 7 },
  "SD":  { id: "SD",  name: "SD Padres", emoji: "🤎", league: "NL", div: "West", w: 15, l: 11 },
  "ARI": { id: "ARI", name: "AZ D-backs", emoji: "🐍", league: "NL", div: "West", w: 13, l: 13 },
  "SF":  { id: "SF",  name: "SF Giants", emoji: "🟠", league: "NL", div: "West", w: 12, l: 14 },
  "COL": { id: "COL", name: "Colorado", emoji: "💜", league: "NL", div: "West", w: 7, l: 18 },
  // NL - EAST
  "ATL": { id: "ATL", name: "Atlanta", emoji: "🪓", league: "NL", div: "East", w: 16, l: 8 },
  "PHI": { id: "PHI", name: "Philadelphia", emoji: "🔔", league: "NL", div: "East", w: 15, l: 10 },
  "NYM": { id: "NYM", name: "NY Mets", emoji: "🔵", league: "NL", div: "East", w: 12, l: 12 },
  "WSH": { id: "WSH", name: "Washington", emoji: "🦅", league: "NL", div: "East", w: 10, l: 15 },
  "MIA": { id: "MIA", name: "Miami", emoji: "🐟", league: "NL", div: "East", w: 7, l: 19 },
  // NL - CENTRAL
  "MIL": { id: "MIL", name: "Milwaukee", emoji: "🍺", league: "NL", div: "Central", w: 14, l: 10 },
  "CHC": { id: "CHC", name: "Chicago Cubs", emoji: "🐻", league: "NL", div: "Central", w: 13, l: 12 },
  "CIN": { id: "CIN", name: "Cincinnati", emoji: "🔴", league: "NL", div: "Central", w: 12, l: 13 },
  "STL": { id: "STL", name: "St. Louis", emoji: "🐦", league: "NL", div: "Central", w: 11, l: 14 },
  "PIT": { id: "PIT", name: "Pittsburgh", emoji: "☠️", league: "NL", div: "Central", w: 12, l: 13 }
};

/**
 * [ 데이터 섹션 2 ]
 * 리그별 경기 일정 (풍부한 데이터 확보를 위해 15개 이상 작성)
 */
const MLB_FULL_SCHEDULE = [
  // AL GAMES
  { league: "AL", time: "오전 04:05 KST", venue: "Oriole Park", away: "MIN", home: "BAL" },
  { league: "AL", time: "오전 05:10 KST", venue: "Yankee Stadium", away: "TOR", home: "NYY" },
  { league: "AL", time: "오전 07:15 KST", venue: "Fenway Park", away: "CWS", home: "BOS" },
  { league: "AL", time: "오전 08:10 KST", venue: "Progressive Field", away: "TB", home: "CLE" },
  { league: "AL", time: "오전 09:38 KST", venue: "Angel Stadium", away: "SEA", home: "LAA" },
  { league: "AL", time: "오전 10:05 KST", venue: "Minute Maid Park", away: "TEX", home: "HOU" },
  { league: "AL", time: "오전 11:10 KST", venue: "Kauffman Stadium", away: "DET", home: "KC" },
  { league: "AL", time: "오후 02:00 KST", venue: "Oakland Coliseum", away: "NYY", home: "OAK" },
  
  // NL GAMES
  { league: "NL", time: "오전 02:15 KST", venue: "Citi Field", away: "PIT", home: "NYM" },
  { league: "NL", time: "오전 03:10 KST", venue: "American Family Field", away: "ARI", home: "MIL" },
  { league: "NL", time: "오전 03:20 KST", venue: "Wrigley Field", away: "WSH", home: "CHC" },
  { league: "NL", time: "오전 05:40 KST", venue: "Truist Park", away: "PHI", home: "ATL" },
  { league: "NL", time: "오전 07:05 KST", venue: "LoanDepot Park", away: "CIN", home: "MIA" },
  { league: "NL", time: "오전 08:10 KST", venue: "Petco Park", away: "SF", home: "SD" },
  { league: "NL", time: "오전 09:15 KST", venue: "Busch Stadium", away: "COL", home: "STL" },
  { league: "NL", time: "오전 11:10 KST", venue: "Dodger Stadium", away: "ARI", home: "LAD" },
  { league: "NL", time: "오후 01:30 KST", venue: "Oracle Park", away: "SD", home: "SF" }
];

/**
 * [ 컴포넌트 섹션 1 ] 
 * 경기 매치 정보 카드
 */
const MatchCardComponent = ({ data }) => {
  const awayInfo = MLB_TEAM_DATABASE[data.away];
  const homeInfo = MLB_TEAM_DATABASE[data.home];

  return (
    <div className="match-item-card">
      <div className="card-top-info">
        <div className="time-label">{data.time}</div>
        <div className="venue-label">{data.venue}</div>
      </div>
      <div className="match-teams-box">
        <div className="team-display-unit">
          <span className="team-icon-big">{awayInfo.emoji}</span>
          <div className="team-id-bold">{data.away}</div>
          <div className="team-stat-small">{awayInfo.w}승 {awayInfo.l}패</div>
        </div>
        <div className="vs-separator">VS</div>
        <div className="team-display-unit">
          <span className="team-icon-big">{homeInfo.emoji}</span>
          <div className="team-id-bold">{data.home}</div>
          <div className="team-stat-small">{homeInfo.w}승 {homeInfo.l}패</div>
        </div>
      </div>
    </div>
  );
};

/**
 * [ 메인 앱 컨트롤러 ]
 */
function MLBMainApplication() {
  const [currentTab, setCurrentTab] = useState(0); // 0: GAMES, 1: STANDINGS
  const [leagueMode, setLeagueMode] = useState("AL"); // AL 고정 출발
  const [searchWord, setSearchWord] = useState("");
  const [touchStartX, setTouchStartX] = useState(0);

  // 시간 상태 관리 (실제 갱신되는 느낌을 위해)
  const [currentTime, setCurrentTime] = useState("오후 05:19:25");
  const [currentDate, setCurrentDate] = useState("3월 26일 (목) 🌙");

  // 스와이프 제스처 로직
  const handleSwipeStart = (e) => {
    setTouchStartX(e.touches[0].clientX);
  };

  const handleSwipeEnd = (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const distance = touchStartX - touchEndX;

    // 왼쪽으로 스와이프 (다음 탭으로)
    if (distance > 100 && currentTab === 0) {
      setCurrentTab(1);
    }
    // 오른쪽으로 스와이프 (이전 탭으로)
    if (distance < -100 && currentTab === 1) {
      setCurrentTab(0);
    }
  };

  /**
   * [ 로직 ] 경기 목록 필터링
   * 리그 필터 + 검색 필터 적용
   */
  const displayMatches = useMemo(() => {
    return MLB_FULL_SCHEDULE.filter(game => {
      const matchLeague = game.league === leagueMode;
      const matchSearch = game.away.toLowerCase().includes(searchWord.toLowerCase()) || 
                          game.home.toLowerCase().includes(searchWord.toLowerCase());
      return matchLeague && matchSearch;
    });
  }, [leagueMode, searchWord]);

  /**
   * [ 로직 ] 리그 순위표 계산 및 필터링
   * 승률(PCT) 기준으로 자동 정렬
   */
  const displayRankings = useMemo(() => {
    const teamsInLeague = Object.values(MLB_TEAM_DATABASE).filter(team => {
      const matchLeague = team.league === leagueMode;
      const matchSearch = team.id.toLowerCase().includes(searchWord.toLowerCase()) || 
                          team.name.toLowerCase().includes(searchWord.toLowerCase());
      return matchLeague && matchSearch;
    });

    return teamsInLeague
      .map(team => ({
        ...team,
        pct: (team.w / (team.w + team.l)).toFixed(3)
      }))
      .sort((a, b) => parseFloat(b.pct) - parseFloat(a.pct));
  }, [leagueMode, searchWord]);

  return (
    <div className="app-container" onTouchStart={handleSwipeStart} onTouchEnd={handleSwipeEnd}>
      
      {/* (1) 헤더 고정 영역 */}
      <header className="dashboard-header">
        <div className="header-main-row">
          <div className="title-group">
            <h1>MLB 대시보드</h1>
            <p>실시간 스코어 및 전 리그 순위</p>
          </div>
          <div className="info-group">
            <div className="clock-display">{currentTime}</div>
            <div className="date-display">
              <span>{currentDate}</span>
            </div>
          </div>
        </div>

        <div className="status-row">
          <span className="update-timestamp">오후 05:19:22 기준 실시간 업데이트</span>
          <button className="refresh-action-btn" onClick={() => window.location.reload()}>
            새로고침
          </button>
        </div>

        {/* (2) 리그 전환 탭 */}
        <div className="league-filter-box">
          <div 
            className={`filter-tab ${leagueMode === "AL" ? "active" : "inactive"}`}
            onClick={() => setLeagueMode("AL")}
          >
            AMERICAN LEAGUE
          </div>
          <div 
            className={`filter-tab ${leagueMode === "NL" ? "active" : "inactive"}`}
            onClick={() => setLeagueMode("NL")}
          >
            NATIONAL LEAGUE
          </div>
        </div>

        {/* (3) 팀 검색 필드 */}
        <div className="search-input-wrapper">
          <input 
            type="text" 
            className="main-search-bar"
            placeholder="팀 이름 혹은 약자 검색 (예: NYY, LAD, ATL...)"
            value={searchWord}
            onChange={(e) => setSearchWord(e.target.value)}
          />
        </div>
      </header>

      {/* (4) 메인 뷰 스위처 (스와이프 가능 영역) */}
      <div 
        className="view-slider"
        style={{ transform: `translateX(-${currentTab * 50}%)` }}
      >
        {/* PAGE A: 경기 목록 */}
        <div className="view-container">
          <div className="page-indicator">
            <span>{leagueMode} 예정된 경기</span>
            <span style={{color: '#E31837'}}>{displayMatches.length} GAMES</span>
          </div>
          
          {displayMatches.length > 0 ? (
            displayMatches.map((game, index) => (
              <MatchCardComponent key={`game-${index}`} data={game} />
            ))
          ) : (
            <div style={{textAlign: 'center', padding: '100px 0', color: 'rgba(0,0,0,0.3)', fontWeight: 'bold'}}>
              검색된 경기가 없습니다.
            </div>
          )}
        </div>

        {/* PAGE B: 리그 순위 */}
        <div className="view-container">
          <div className="page-indicator">
            <span>{leagueMode} 정규 시즌 순위</span>
            <span>2026 Season</span>
          </div>

          <div className="standing-list-wrapper">
            <div className="st-header">
              <span>RANK</span>
              <span>TEAM</span>
              <span>W</span>
              <span>L</span>
              <span style={{textAlign: 'right'}}>PCT</span>
            </div>

            {displayRankings.map((team, idx) => (
              <div key={team.id} className="st-row">
                <span className="st-rank">{idx + 1}</span>
                <div className="st-team-box">
                  <span className="st-team-icon">{team.emoji}</span>
                  <span className="st-team-id">{team.id}</span>
                </div>
                <span className="st-val-bold">{team.w}</span>
                <span className="st-val-light">{team.l}</span>
                <span className="st-pct">{team.pct}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* (5) 하단 고정 내비게이션 바 */}
      <nav className="bottom-navigation">
        <div 
          className="nav-button"
          onClick={() => setCurrentTab(0)}
        >
          <div className="nav-icon-box">📅</div>
          <div className={`nav-text-box ${currentTab === 0 ? "nav-active-color" : "nav-default-color"}`}>
            오늘 경기
          </div>
        </div>
        <div 
          className="nav-button"
          onClick={() => setCurrentTab(1)}
        >
          <div className="nav-icon-box">🏆</div>
          <div className={`nav-text-box ${currentTab === 1 ? "nav-active-color" : "nav-default-color"}`}>
            리그 순위
          </div>
        </div>
      </nav>

    </div>
  );
}

// 최종 렌더링 엔진 가동
const domContainer = document.getElementById("root");
const rootElement = ReactDOM.createRoot(domContainer);
rootElement.render(<MLBMainApplication />);
</script>
</body>
</html>
